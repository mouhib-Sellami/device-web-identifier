<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Device Identifier Test</title>
</head>
<body>
  <h2>Device Identification Test</h2>
  <button id="run">Run</button>
  <pre id="output" style="background:#111;color:#0f0;padding:1rem;margin-top:1rem;border-radius:6px"></pre>

  <script type="module">
    import { getDeviceIdentification } from "../dist/index.mjs";

    document.getElementById("run").addEventListener("click", async () => {
      const output = document.getElementById("output");
      output.textContent = "Loading...";
      try {
        const result = await getDeviceIdentification();
        output.textContent = JSON.stringify(result, null, 2);
      } catch (err) {
        output.textContent = "Error: " + err.message;
      }
    });
  </script>
</body>
</html>
